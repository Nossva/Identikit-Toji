<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Toji - Test tu conocimiento</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background-color: #2B4162;
            margin: 0;
            padding: 20px;
        }
        
        .trivia-container {
            background-color: #8F754F;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }
        
        .trivia-container h1 {
            color: #D7B377;
            font-size: 36px;
            margin: 0 0 20px 0;
        }
        
        .trivia-container h2 {
            color: #F5E3B3;
            font-size: 18px;
            font-weight: normal;
            margin: 0 0 30px 0;
        }
        
        .trivia-container img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin: 20px 0;
            border: 3px solid #D7B377;
        }
        
        .btn-jugar {
            background-color: #1296d4;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.3s ease;
            border: 2px solid #1296d4;
        }
        
        .btn-jugar:hover {
            background-color: transparent;
            color: #1296d4;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <center>
        <div class="trivia-container">
            <h1>⚔️ TRIVIA TOJI FUSHIGURO ⚔️</h1>
            <h2>¿Cuánto sabes del asesino de hechiceros?</h2>
            <img src="../img/Toji/TojiSonriendo.png" alt="Toji">
            <p style="color: #F5E3B3; line-height: 1.6;">
                Demuestra tu conocimiento sobre Toji Fushiguro.
                <br>Responde correctamente las 3 preguntas para ganar.
            </p>
            <a href="nivel1.html" class="btn-jugar">COMENZAR TRIVIA</a>
        </div>
    </center>
</body>

</html>
